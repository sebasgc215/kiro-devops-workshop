name: Integración Continua - Lint, Pruebas y Build

# Se ejecuta en push a main y en cualquier pull request hacia main
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Verificación de estilo con ESLint
  # ─────────────────────────────────────────
  lint:
    name: Verificación de Estilo (ESLint)
    runs-on: ubuntu-latest

    steps:
      - name: Obtener código fuente
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar ESLint
        run: npm run lint

      - name: Notificar fallo en Slack
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ *Fallo en el pipeline*: `${{ github.workflow }}`\n*Job*: Lint\n*Repositorio*: ${{ github.repository }}\n*Rama*: ${{ github.ref_name }}\n*Commit*: ${{ github.sha }}\n*Ejecutado por*: ${{ github.actor }}\n*Ver detalles*: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.CARVAJAL_SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # ─────────────────────────────────────────
  # JOB 2: Pruebas unitarias con Jest
  # ─────────────────────────────────────────
  test:
    name: Pruebas Automatizadas (Jest)
    runs-on: ubuntu-latest
    needs: lint  # Solo corre si lint pasó

    steps:
      - name: Obtener código fuente
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar pruebas con Jest
        run: npm test

      # Sube el reporte de cobertura como artefacto para revisión
      - name: Subir reporte de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cobertura-de-pruebas
          path: coverage/
          retention-days: 7

      - name: Notificar fallo en Slack
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ *Fallo en el pipeline*: `${{ github.workflow }}`\n*Job*: Tests\n*Repositorio*: ${{ github.repository }}\n*Rama*: ${{ github.ref_name }}\n*Commit*: ${{ github.sha }}\n*Ejecutado por*: ${{ github.actor }}\n*Ver detalles*: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.CARVAJAL_SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # ─────────────────────────────────────────
  # JOB 3: Build del proyecto
  # ─────────────────────────────────────────
  build:
    name: Compilación y Empaquetado
    runs-on: ubuntu-latest
    needs: test  # Solo corre si los tests pasaron

    steps:
      - name: Obtener código fuente
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar build
        run: npm run build

      - name: Notificar fallo en Slack
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ *Fallo en el pipeline*: `${{ github.workflow }}`\n*Job*: Build\n*Repositorio*: ${{ github.repository }}\n*Rama*: ${{ github.ref_name }}\n*Commit*: ${{ github.sha }}\n*Ejecutado por*: ${{ github.actor }}\n*Ver detalles*: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.CARVAJAL_SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
